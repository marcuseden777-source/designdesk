services:
  - type: web
    name: designdesk-api
    runtime: node
    rootDir: app/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these manually in Render dashboard (sensitive):
      # SUPABASE_URL
      # SUPABASE_SERVICE_ROLE_KEY
      # SUPABASE_JWT_SECRET
      # ANTHROPIC_API_KEY
      # NVIDIA_API_KEY
